name: FastFlow CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --no-interaction --no-root
        
    - name: Run Ruff (Linter)
      run: poetry run ruff check .

    - name: Run Mypy (Type Checker)
      run: poetry run mypy .

    - name: Set test environment variables
      run: |
        echo "BOT_TOKEN=test_token" >> $GITHUB_ENV
        echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV

    - name: Run Pytest with Coverage
      run: poetry run pytest -v
      
    - name: Run Bandit (Python SAST)
      # ✅ Сканируем весь корень проекта, исключая папки зависимостей и виртуальных сред
      run: poetry run bandit -r . -x ./venv,./.git,./.mypy_cache,./.pytest_cache,./.ruff_cache -ll

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image for Scanning
      run: docker build -t vpn_bot:ci .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vpn_bot:ci'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'