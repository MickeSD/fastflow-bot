services:
  flow-app:
    build: .
    container_name: flow_app
    restart: unless-stopped
    environment:
      OBSERVABILITY_HOST: "0.0.0.0"
    env_file:
      - .env
    volumes:
      - ./app_data.db:/app/vpn_database.db
      - ./backups:/app/backups
      - ./bot.log:/app/bot.log
    ports:
      - "127.0.0.1:8080:8080" # ✅ Доступ теперь открыт ТОЛЬКО внутри сервера
    depends_on:
      - flow-redis

  flow-redis:
    image: redis:7-alpine
    container_name: flow_redis
    restart: unless-stopped

  flow-worker:
    build: .
    container_name: flow_worker
    restart: unless-stopped
    environment:
      OBSERVABILITY_HOST: "0.0.0.0"
    env_file:
      - .env
    volumes:
      - ./app_data.db:/app/vpn_database.db
      - ./backups:/app/backups
      - ./bot.log:/app/bot.log
    command: python -m arq infrastructure.worker.WorkerSettings
    depends_on:
      - flow-redis

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686" # ✅ Jaeger UI тоже закрываем от посторонних глаз
      - "4318:4318"